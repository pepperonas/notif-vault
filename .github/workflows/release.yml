name: Release

# Push a tag like `v1.2.3` → this builds a signed release APK and
# publishes it as a downloadable GitHub Release asset. Future updates:
# bump versionName/versionCode in app/build.gradle.kts, then
#   git tag v1.2.3 && git push origin v1.2.3
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: ver
        env:
          # Pass untrusted dispatch input through env (never inline into
          # the shell) and validate it before using it downstream.
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          NAME="${GITHUB_REF_NAME:-$INPUT_TAG}"
          if ! printf '%s' "$NAME" | grep -Eq '^v[0-9A-Za-z._+-]+$'; then
            echo "Invalid version/tag: '$NAME' (expected like v1.2.3)" >&2
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "kleene-petze-${{ steps.ver.outputs.name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.name }}
          name: Kleene Petze ${{ steps.ver.outputs.name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: kleene-petze-${{ steps.ver.outputs.name }}.apk

      - name: Clean up keystore
        if: always()
        run: rm -f release.jks
